<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">ServiceのRequestとResponse</title>
  <desc id="desc">ClientがServerへRequestを送り、ServerがResponseを返す同期通信図</desc>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#475569"/></marker></defs>
  <style>.bg{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.client{fill:#fff;stroke:#2563eb;stroke-width:3}.server{fill:#fff;stroke:#7c3aed;stroke-width:3}.title{font:700 30px system-ui,sans-serif;fill:#0f172a}.label{font:700 22px system-ui,sans-serif;fill:#0f172a}.sub{font:500 16px system-ui,sans-serif;fill:#475569}.req{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#a)}.res{stroke:#7c3aed;stroke-width:4;fill:none;marker-end:url(#a)}.wait{fill:#fff7ed;stroke:#ea580c;stroke-width:2}</style>
  <rect x="10" y="10" width="1180" height="410" rx="24" class="bg"/><text x="48" y="62" class="title">Service通信: Request / Response</text>
  <rect x="70" y="135" width="250" height="130" rx="22" class="client"/><text x="145" y="185" class="label">Client</text><text x="118" y="220" class="sub">処理を要求するNode</text>
  <rect x="880" y="135" width="250" height="130" rx="22" class="server"/><text x="952" y="185" class="label">Server</text><text x="925" y="220" class="sub">処理を実行するNode</text>
  <path d="M320 175 H880" class="req"/><text x="535" y="150" class="label" fill="#2563eb">Request</text><text x="500" y="178" class="sub">例: {a: 2, b: 3}</text>
  <path d="M880 240 H320" class="res"/><text x="530" y="278" class="label" fill="#7c3aed">Response</text><text x="548" y="307" class="sub">例: {sum: 5}</text>
  <rect x="430" y="335" width="340" height="48" rx="18" class="wait"/><text x="465" y="365" class="sub">Clientは応答を待つため、短時間処理向け</text>
</svg>