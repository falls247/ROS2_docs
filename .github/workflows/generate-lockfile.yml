name: Generate package lock

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/quality-reproducibility'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/quality-reproducibility

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package-lock.json
        if: steps.lockfile.outputs.exists == 'false'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit package-lock.json
        if: steps.lockfile.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "20260711_chore_add package lock"
          git push origin HEAD:agent/quality-reproducibility
